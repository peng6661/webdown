<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>WebDown</title><style>:root{color-scheme:light;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{margin:0;width:420px;background:#f6f7fb;color:#111827}.panel{padding:16px}h1{margin:0 0 6px;font-size:18px}.subtitle{margin:0 0 16px;color:#6b7280;font-size:12px;line-height:1.5}.section{margin-top:14px;padding:12px;border-radius:12px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.08)}.contact-card{margin-top:10px;padding:10px 12px;border-radius:10px;background:#eff6ff;border:1px solid #bfdbfe}.contact-title{margin:0 0 4px;font-size:12px;font-weight:700;color:#1e3a8a}.contact-row{margin:0;font-size:12px;color:#1f2937;line-height:1.5}.contact-link{color:#1d4ed8;text-decoration:none}.contact-link:hover{text-decoration:underline}.update-banner{margin-top:10px;padding:10px 12px;border-radius:10px;background:#fff7ed;border:1px solid #fed7aa}.update-title{margin:0 0 4px;font-size:12px;font-weight:700;color:#9a3412}.update-text{margin:0;font-size:12px;color:#7c2d12;line-height:1.5;white-space:pre-wrap}.update-link{display:inline-block;margin-top:6px;font-size:12px;color:#c2410c;text-decoration:none;font-weight:600}.update-link:hover{text-decoration:underline}.section-title{margin:0 0 10px;font-size:13px;font-weight:700;color:#111827}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field,.option{display:flex;flex-direction:column;gap:6px;font-size:12px;color:#374151}.field.full,.option.full{grid-column:1/-1}.field input,.field select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-size:13px;background:#fff;color:#111827}.option.inline{flex-direction:row;align-items:center;gap:8px}.option.inline input[type=checkbox],.option.inline input[type=radio]{width:16px;height:16px;margin:0}.radio-group{display:grid;gap:8px}.hint{color:#6b7280;font-size:11px;line-height:1.4}button{width:100%;border:0;border-radius:10px;padding:12px 14px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}button:disabled{background:#93c5fd;cursor:progress}.button-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}.button-row.controls{grid-template-columns:repeat(3,minmax(0,1fr))}.button-row.single{grid-template-columns:1fr}.button-secondary{background:#e5e7eb;color:#111827}.button-secondary:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}.license-panel{margin-top:10px;padding:10px;border-radius:10px;background:#f8fafc;display:grid;gap:6px}.license-header{display:flex;align-items:center;justify-content:space-between;gap:8px}.license-badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;background:#e5e7eb;color:#374151}.license-badge.active{background:#dcfce7;color:#166534}.license-badge.grace{background:#fef3c7;color:#92400e}.license-badge.expired,.license-badge.revoked,.license-badge.unlicensed{background:#fee2e2;color:#b91c1c}.license-plan{font-size:11px;color:#4b5563}.status{margin-top:14px;padding:12px;border-radius:12px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.08)}.status-stage{font-size:12px;color:#2563eb;font-weight:600;margin-bottom:6px}.status-current,.status-message{font-size:13px;line-height:1.5;color:#111827;white-space:pre-wrap;word-break:break-word}.status-current{margin-top:8px;color:#4b5563;font-size:12px}.status-error{margin-top:8px;font-size:12px;color:#b91c1c;white-space:pre-wrap}.stats{margin-top:10px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;font-size:12px;color:#4b5563}.stat{padding:8px;border-radius:8px;background:#f8fafc}.hidden{display:none!important}</style></head><body><div class="panel"><h1 id="title-main">WebDown</h1><p id="subtitle-main" class="subtitle">支持“保存当前页”与“整站抓取”两种模式，输出为 ZIP 离线包。</p><div class="contact-card"><p id="contact-title" class="contact-title">联系方式</p><p class="contact-row"><span id="contact-email-label">邮箱：</span> <a id="contact-email-link" class="contact-link" href="mailto:ctzl2022@gmail.com">ctzl2022@gmail.com</a></p><p id="legal-disclaimer" class="contact-row"></p></div><div id="update-banner" class="update-banner hidden"><p id="update-title" class="update-title">发现新版本</p><p id="update-text" class="update-text"></p><a id="update-link" class="update-link" href="#" target="_blank" rel="noopener noreferrer"></a></div><section class="section"><div class="section-title" id="section-language-title">语言</div><div class="grid"><label class="field full"><span id="label-language">界面语言</span> <select id="ui-language"><option value="auto">Auto (跟随浏览器)</option><option value="zh-CN">中文</option><option value="en-US">English</option></select></label></div></section><section class="section"><div class="section-title" id="section-mode-title">模式</div><div class="radio-group"><label class="option inline"><input id="mode-page" type="radio" name="mode" value="page"/> <span id="label-mode-page">保存当前页</span></label> <label class="option inline"><input id="mode-site" type="radio" name="mode" value="site"/> <span id="label-mode-site">整站抓取</span></label></div></section><section class="section"><div class="section-title" id="section-basic-title">基础</div><div class="grid"><label class="field full"><span id="label-start-url">起始 URL</span> <input id="start-url" type="url" placeholder="https://example.com"/></label> <label class="field"><span id="label-archive-name">ZIP 文件名</span> <input id="archive-name" type="text" placeholder="留空则自动生成"/></label> <label class="field"><span id="label-zip-root-folder">ZIP 根目录</span> <input id="zip-root-folder" type="text" placeholder="可选"/></label></div></section><section class="section"><div class="section-title" id="section-crawl-title">抓取控制</div><div class="grid"><label class="field crawl-only"><span id="label-depth">抓取深度</span> <input id="depth" type="number" min="0" max="10"/></label> <label class="field crawl-only"><span id="label-page-scope">页面范围</span> <select id="page-scope"><option value="same-origin" id="scope-same-origin">仅当前域名</option><option value="same-site" id="scope-same-site">同主站/子域名</option><option value="any-domain" id="scope-any-domain">任意域名</option></select></label> <label class="option inline full"><input id="allow-external-resources" type="checkbox"/> <span id="label-allow-external-resources">允许下载外部资源</span></label> <label class="option inline"><input id="include-scripts" type="checkbox"/> <span id="label-include-scripts">下载第三方脚本</span></label> <label class="option inline"><input id="include-media" type="checkbox"/> <span id="label-include-media">下载音视频资源</span></label> <label class="option inline"><input id="render" type="checkbox"/> <span id="label-render">等待渲染后抓取</span></label> <label class="field"><span id="label-render-timeout">渲染等待 (ms)</span> <input id="render-timeout-ms" type="number" min="0" step="500"/></label> <label class="option inline"><input id="sequential" type="checkbox"/> <span id="label-sequential">串行模式</span></label> <label class="field"><span id="label-max-concurrency">并发下载数</span> <input id="max-concurrency" type="number" min="1" max="20"/></label> <label class="option inline full"><input id="quiet" type="checkbox"/> <span id="label-quiet">Quiet 模式</span></label></div></section><section class="section"><div class="section-title" id="section-proxy-title">代理</div><div class="grid"><label class="field full"><span id="label-proxy-url">代理地址</span> <input id="proxy-url" type="text" placeholder="host:port 或 http://host:port"/></label></div><div id="proxy-note" class="hint">当前版本仅预留代理输入位，尚未启用真实代理能力。</div></section><section id="license-section" class="section hidden"><div class="section-title" id="section-license-title">授权</div><div id="license-activate-form" class="grid"><label class="field full"><span id="label-license-code">激活码</span> <input id="license-code" type="text" placeholder="WD1-XXXX-XXXX-XXXX-XXXX" autocomplete="off"/></label></div><div id="license-action-row" class="button-row"><button id="activate-button" type="button">激活插件</button> <button id="refresh-license-button" type="button" class="button-secondary">刷新授权</button></div><div id="license-panel" class="license-panel"><div class="license-header"><span id="license-badge" class="license-badge unlicensed">未激活</span> <span id="license-plan" class="license-plan hidden"></span></div><div id="license-message" class="hint">请输入激活码后再开始归档</div><div id="license-meta" class="hint hidden"></div></div></section><div class="button-row controls"><button id="start-button" type="button">开始</button> <button id="pause-button" type="button" class="button-secondary">暂停</button> <button id="cancel-button" type="button" class="button-secondary">取消</button></div><section class="status" aria-live="polite"><div id="status-stage" class="status-stage">idle</div><div id="status-message" class="status-message">准备就绪</div><div id="status-current" class="status-current hidden"></div><div id="status-error" class="status-error" hidden></div><div id="status-stats" class="stats"></div></section></div><script src="src/constants.js"></script><script src="src/utils.js"></script><script src="popup.js"></script></body></html>
